<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orange Mission Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Space Grotesk',sans-serif;background:radial-gradient(circle at 10% 10%,#fff7ed 0,#fff 45%),linear-gradient(120deg,#fff7ed 0,#f8fafc 100%);} 
    .mono{font-family:'IBM Plex Mono',monospace}
    .grain:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/></filter><rect width="160" height="160" filter="url(%23n)" opacity=".35"/></svg>');}
    .task{cursor:grab}
  </style>
</head>
<body class="grain min-h-screen text-slate-800">
  <div class="max-w-[1500px] mx-auto p-4 md:p-8 space-y-6">
    <header class="bg-white/80 backdrop-blur rounded-2xl border border-orange-100 p-5 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold">Orange 🍊 Mission Board</h1>
          <p class="text-slate-600">Batch assign work, drag cards, and auto-summarize daily progress.</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button id="seedBtn" class="px-4 py-2 rounded-lg bg-orange-500 text-white">Load Today Plan</button>
          <button id="dailySummaryBtn" class="px-4 py-2 rounded-lg bg-emerald-600 text-white">Export Daily Summary</button>
          <button id="exportBtn" class="px-4 py-2 rounded-lg bg-slate-900 text-white">Export JSON</button>
          <label class="px-4 py-2 rounded-lg bg-slate-200 cursor-pointer">Import JSON<input id="importFile" type="file" accept="application/json" class="hidden"></label>
          <button id="clearBtn" class="px-4 py-2 rounded-lg bg-red-600 text-white">Clear</button>
        </div>
      </div>
    </header>

    <section class="bg-white rounded-2xl border border-orange-100 p-4 md:p-5 shadow-sm">
      <div class="grid md:grid-cols-6 gap-3">
        <input id="title" class="md:col-span-2 w-full px-3 py-2.5 rounded-lg border border-slate-200" placeholder="Task title" />
        <input id="assignee" class="w-full px-3 py-2.5 rounded-lg border border-slate-200" placeholder="Assignee (e.g. Orange)" value="Orange"/>
        <select id="priority" class="w-full px-3 py-2.5 rounded-lg border border-slate-200">
          <option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option>
        </select>
        <input id="due" type="date" class="w-full px-3 py-2.5 rounded-lg border border-slate-200"/>
        <button id="addBtn" class="w-full px-4 py-2.5 rounded-lg bg-orange-500 text-white font-semibold">Add Task</button>
      </div>
      <div class="mt-3 grid md:grid-cols-[1fr_auto] gap-3">
        <textarea id="batch" rows="3" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 mono text-sm" placeholder="Batch mode: one task per line"></textarea>
        <button id="addBatchBtn" class="px-4 py-2.5 rounded-lg bg-slate-900 text-white">Add Batch</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl border border-emerald-100 p-4 md:p-5 shadow-sm" id="dailySummary"></section>

    <main class="grid md:grid-cols-5 gap-4" id="board"></main>
  </div>

<script>
const STORAGE='orange-kanban-v2';
const COLUMNS=['Backlog','Ready','In Progress','Blocked','Done'];
let state=JSON.parse(localStorage.getItem(STORAGE)||'null')||{tasks:[]};

const colors={Low:'bg-slate-100 text-slate-600',Medium:'bg-amber-100 text-amber-700',High:'bg-orange-100 text-orange-700',Urgent:'bg-rose-100 text-rose-700'};

const el={
  title:document.getElementById('title'),
  assignee:document.getElementById('assignee'),
  priority:document.getElementById('priority'),
  due:document.getElementById('due'),
  batch:document.getElementById('batch'),
  board:document.getElementById('board'),
  dailySummary:document.getElementById('dailySummary')
};

function uid(){return Math.random().toString(36).slice(2,10)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));render();}

function normalizeTask(t){
  return {
    id:t.id||uid(),
    title:t.title||'Untitled',
    assignee:t.assignee||'Orange',
    priority:t.priority||'Medium',
    due:t.due||'',
    status:t.status||'Backlog',
    createdAt:t.createdAt||new Date().toISOString(),
    updatedAt:t.updatedAt||new Date().toISOString(),
    completedAt:t.completedAt||''
  }
}

state.tasks = (state.tasks||[]).map(normalizeTask);

function addTask(t){state.tasks.push(normalizeTask(t));}

function ensureTodayMission(){
  const title='Build LLM + RAG system';
  const exists=state.tasks.some(t=>(t.title||'').toLowerCase().includes('llm') && (t.title||'').toLowerCase().includes('rag'));
  if(!exists){
    addTask({title,assignee:'Orange',priority:'Urgent',due:todayStr(),status:'Ready'});
  }
}

function moveTask(task,newStatus){
  task.status=newStatus;
  task.updatedAt=new Date().toISOString();
  if(newStatus==='Done' && !task.completedAt) task.completedAt=new Date().toISOString();
  if(newStatus!=='Done') task.completedAt='';
}

function escapeHtml(s){return (s||'').replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[m]))}

function isOverdue(task){
  if(!task.due || task.status==='Done') return false;
  return task.due < todayStr();
}

function renderSummary(){
  const t=todayStr();
  const createdToday=state.tasks.filter(x=>(x.createdAt||'').slice(0,10)===t).length;
  const doneToday=state.tasks.filter(x=>(x.completedAt||'').slice(0,10)===t).length;
  const total=state.tasks.length;
  const doneAll=state.tasks.filter(x=>x.status==='Done').length;
  const overdue=state.tasks.filter(isOverdue).length;
  const open=Math.max(total-doneAll,0);
  const completion=total?Math.round((doneAll/total)*100):0;

  el.dailySummary.innerHTML=`
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div>
        <h2 class="text-lg md:text-xl font-bold">Daily Summary · ${t}</h2>
        <p class="text-slate-600 text-sm">Auto-updated from board activity</p>
      </div>
      <div class="mono text-xs text-slate-500">Created today: ${createdToday} · Done today: ${doneToday}</div>
    </div>
    <div class="grid md:grid-cols-5 gap-3 mt-3">
      ${card('Total Tasks', total, 'slate')}
      ${card('Open', open, 'amber')}
      ${card('Done', doneAll, 'emerald')}
      ${card('Overdue', overdue, 'rose')}
      ${card('Completion', completion + '%', 'orange')}
    </div>
  `;
}

function card(label,val,tone){
  const map={
    slate:'bg-slate-50 border-slate-200 text-slate-800',
    amber:'bg-amber-50 border-amber-200 text-amber-800',
    emerald:'bg-emerald-50 border-emerald-200 text-emerald-800',
    rose:'bg-rose-50 border-rose-200 text-rose-800',
    orange:'bg-orange-50 border-orange-200 text-orange-800'
  };
  return `<div class="rounded-xl border p-3 ${map[tone]||map.slate}"><div class="text-xs">${label}</div><div class="text-xl font-bold">${val}</div></div>`;
}

function render(){
  el.board.innerHTML='';
  COLUMNS.forEach(col=>{
    const items=state.tasks.filter(t=>t.status===col);
    const section=document.createElement('section');
    section.className='bg-white rounded-2xl border border-slate-200 p-3 min-h-[340px]';
    section.innerHTML=`<div class="flex justify-between items-center mb-3"><h3 class="font-bold">${col}</h3><span class="mono text-xs text-slate-500">${items.length}</span></div><div class="space-y-2 col-list" data-col="${col}"></div>`;
    el.board.appendChild(section);

    const list=section.querySelector('.col-list');
    items.forEach(task=>{
      const card=document.createElement('article');
      const overdueTag=isOverdue(task)?'<span class="px-2 py-1 rounded bg-rose-100 text-rose-700">Overdue</span>':'';
      card.className='task bg-slate-50 border border-slate-200 rounded-xl p-3';
      card.dataset.id=task.id;
      card.innerHTML=`<div class="font-semibold">${escapeHtml(task.title)}</div>
      <div class="mt-2 flex items-center justify-between text-xs"><span class="px-2 py-1 rounded ${colors[task.priority]||colors.Medium}">${task.priority}</span><span class="text-slate-500 mono">${escapeHtml(task.assignee||'-')}</span></div>
      <div class="mt-2 text-xs text-slate-500">${task.due?('Due: '+task.due):'No due date'}</div>
      <div class="mt-2 flex items-center justify-between text-xs">${overdueTag}<button class="text-red-600" onclick="removeTask('${task.id}')">Delete</button></div>`;
      list.appendChild(card);
    });

    new Sortable(list,{group:'kanban',animation:150,onEnd:(evt)=>{
      const id=evt.item.dataset.id;
      const task=state.tasks.find(x=>x.id===id);
      if(task){ moveTask(task, evt.to.dataset.col); save(); }
    }});
  });

  renderSummary();
}

function removeTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);save();}

function exportDailySummary(){
  const t=todayStr();
  const doneToday=state.tasks.filter(x=>(x.completedAt||'').slice(0,10)===t);
  const openTasks=state.tasks.filter(x=>x.status!=='Done');
  const lines=[
    `# Daily Summary (${t})`,
    '',
    `- Total tasks: ${state.tasks.length}`,
    `- Open tasks: ${openTasks.length}`,
    `- Done today: ${doneToday.length}`,
    '',
    '## Completed Today',
    ...(doneToday.length?doneToday.map(x=>`- [x] ${x.title} (${x.priority})`):['- (none)']),
    '',
    '## Open Tasks',
    ...(openTasks.length?openTasks.map(x=>`- [ ] ${x.title} (${x.status}${x.due?`, due ${x.due}`:''})`):['- (none)'])
  ];
  const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`daily-summary-${t}.md`;
  a.click();
}

function seedTodayPlan(){
  const seed=[
    {title:'Test Second Brain v2 auto_prioritize with live tasks',priority:'High',status:'Ready'},
    {title:'Build Biology Pack v2 (Thai/EN + printable worksheets)',priority:'High',status:'Backlog'},
    {title:'Implement Obsidian ↔ Google Sheets nightly sync bridge',priority:'Urgent',status:'Backlog'},
    {title:'Fix OpenClaw cron pairing issue for 23:00 autopilot',priority:'High',status:'In Progress'},
    {title:'Track daily token usage and fallback trigger thresholds',priority:'Medium',status:'Ready'}
  ];
  seed.forEach(s=>addTask({...s,assignee:'Orange',due:todayStr()}));
  save();
}

document.getElementById('addBtn').onclick=()=>{
  const title=el.title.value.trim();
  if(!title)return;
  addTask({title,assignee:el.assignee.value.trim(),priority:el.priority.value,due:el.due.value,status:'Backlog'});
  el.title.value='';
  save();
};

document.getElementById('addBatchBtn').onclick=()=>{
  const lines=el.batch.value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length)return;
  lines.forEach(line=>addTask({title:line,assignee:el.assignee.value.trim(),priority:el.priority.value,due:el.due.value,status:'Backlog'}));
  el.batch.value='';
  save();
};

document.getElementById('dailySummaryBtn').onclick=exportDailySummary;
document.getElementById('seedBtn').onclick=seedTodayPlan;

document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='orange-kanban.json';
  a.click();
};

document.getElementById('importFile').onchange=(e)=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const j=JSON.parse(r.result); if(j.tasks){state={tasks:j.tasks.map(normalizeTask)}; save();}}catch{} };
  r.readAsText(f);
};

document.getElementById('clearBtn').onclick=()=>{ if(confirm('Clear all tasks?')){state={tasks:[]}; save();} };

ensureTodayMission();
save();
</script>
</body>
</html>
