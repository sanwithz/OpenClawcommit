<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl bg-white rounded-2xl shadow p-6 space-y-4">
      <h1 class="text-2xl font-bold">Contact Form</h1>
      <p class="text-sm text-gray-500">บันทึกลง Google Sheet + สร้าง PDF + ส่งอีเมลอัตโนมัติ</p>

      <form id="contactForm" class="space-y-3">
        <input id="name" type="text" placeholder="ชื่อ" class="w-full border rounded-lg p-3" required />
        <input id="phone" type="text" placeholder="เบอร์โทร" class="w-full border rounded-lg p-3" required />
        <input id="email" type="email" placeholder="อีเมล" class="w-full border rounded-lg p-3" required />
        <button type="submit" class="w-full bg-black text-white rounded-lg p-3">Submit</button>
      </form>

      <div id="status" class="text-sm"></div>
    </div>

    <script>
      const form = document.getElementById('contactForm');
      const statusBox = document.getElementById('status');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        statusBox.textContent = 'กำลังส่ง...';

        const payload = {
          name: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
        };

        google.script.run
          .withSuccessHandler((res) => {
            statusBox.textContent = `✅ ${res.message} (ส่งไป: ${res.sentTo})`;
            form.reset();
          })
          .withFailureHandler((err) => {
            statusBox.textContent = `❌ ${err.message}`;
          })
          .submit(JSON.stringify(payload));
      });
    </script>
  </body>
</html>
